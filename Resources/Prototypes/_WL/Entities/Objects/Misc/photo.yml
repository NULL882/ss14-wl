- type: entity
  parent: BaseItem
  id: PhotoCamera
  name: "camera"
  description: 'Say "Cheeese!", uses paper for printing'
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: camera
  - type: Eye
  - type: IgnoreGlobalOverlays
  - type: PhotoCamera
  - type: UseDelay
  - type: ActivatableUI
    key: enum.PhotoCameraUiKey.Key
  - type: UserInterface
    interfaces:
      enum.PhotoCameraUiKey.Key:
        type: PhotoCameraBoundUserInterface
  - type: MaterialStorage
    whitelist:
      tags:
        - Paper
  - type: ItemSlots
    slots:
      filter:
        name: photo-camera-filter-slot
        whitelist:
          components:
          - PhotoCameraFilter
  - type: ContainerContainer
    containers:
      filter: !type:ContainerSlot

- type: entity
  name: "photo"
  parent: BasePaper
  id: PhotoCard
  description: "Paper with printed image on it."
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: card
  - type: ActivatableUI
    key: enum.PhotoCardUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PhotoCardUiKey.Key:
        type: PhotoCardBoundUserInterface
  - type: PhotoCard
  - type: FaxableObject

- type: entity
  id: PhotoFilterPack
  parent: [ BoxCardboard, BaseBagOpenClose ]
  name: "filter pack"
  description: "A convenient thing for storing camera filters."
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/filter_rack.rsi
    layers:
    - state: rack
    - state: fill-0
      map: ["enum.StorageFillLayers.Fill"]
  - type: Item
    size: Small
  - type: Storage
    grid:
    - 0,0,3,1
  - type: StorageFillVisualizer
    maxFillLevels: 5
    fillBaseName: fill

- type: entity
  id: PhotoFilterPackFill
  parent: PhotoFilterPack
  suffix: Filled
  components:
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: PhotoFilterMonochrome
        - id: PhotoFilterNightVision
        - id: PhotoFilterCatEars
        - id: PhotoFilterInfo

- type: entity
  name: 'vintage filter'
  parent: BaseItem
  id: PhotoFilterMonochrome
  description: "A simple camera filter that gives a vintage atmosphere."
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: filter
    - state: filter-gray
    - state: filter-top
      color: "#a0da4b"
  - type: PhotoCameraFilter
    filterComponents:
      - type: PhotoShaderFilter
        shader: CameraMonochrome
      - type: PhotoFilterBase

- type: entity
  name: 'night filter'
  parent: BaseItem
  id: PhotoFilterNightVision
  description: "A simple camera filter. Unfortunately, it doesn't provide night vision"
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: filter
    - state: filter-line
    - state: filter-top
      color: "#a0da4b"
  - type: PhotoCameraFilter
    filterComponents:
      - type: PhotoShaderFilter
        shader: CameraNightVision
      - type: PhotoFilterBase

- type: entity
  name: 'burned filter'
  parent: BaseItem
  id: PhotoFilterGhost
  description: "Burnt camera filter.. giving a very strange ability."
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: filter
    - state: filter-ghost
    - state: filter-top
      color: "#e53c54"
  - type: PhotoCameraFilter
    filterComponents:
      - type: PhotoGhostFilter
        visual:
          sprite: _WL/Effects/photo_filters.rsi
          state: observer
      - type: PhotoFilterBase

- type: entity
  name: 'cat filter'
  parent: BaseItem
  id: PhotoFilterCatEars
  description: "A smart camera filter that turns your colleagues into kittens!"
  components:
  - type: Sprite
    sprite: _WL/Objects/Misc/camera.rsi
    layers:
    - state: filter
    - state: filter-smart
    - state: filter-top
      color: "#d751cc"
  - type: PhotoCameraFilter
    filterComponents:
      - type: PhotoFaceFilter
        visual:
          sprite: _WL/Effects/photo_filters.rsi
          state: cat
      - type: PhotoFilterBase

- type: entity
  name: 'information filter'
  parent: BaseItem
  id: PhotoFilterInfo
  description: "A smart camera filter, perfect for photo reports."
  components:
  - type: Sprite
    sprite:  _WL/Objects/Misc/camera.rsi
    layers:
    - state: filter
    - state: filter-smart
    - state: filter-top
      color: "#d751cc"
  - type: PhotoCameraFilter
    filterComponents:
      - type: PhotoInfoFilter
      - type: PhotoFaceFilter
        visual:
          sprite: _WL/Effects/photo_filters.rsi
          state: box
      - type: PhotoFilterBase
